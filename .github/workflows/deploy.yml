name: Deploy ShiftSync to Azure

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v3

      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Build and push Frontend (Injecting API URL at build time)
      - name: Build and push frontend image
        run: |
          docker buildx build --platform linux/amd64 \
            -f Dockerfile-client \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            -t ghcr.io/${{ github.repository }}/client:latest .
          docker push ghcr.io/${{ github.repository }}/client:latest

      # Build and push Backend
      - name: Build and push backend image
        run: |
          docker buildx build --platform linux/amd64 \
            -f Dockerfile-server \
            -t ghcr.io/${{ github.repository }}/server:latest .
          docker push ghcr.io/${{ github.repository }}/server:latest

      - name: Azure Login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # Deploy Backend
      - name: Deploy backend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_BACKEND }}
          images: ghcr.io/${{ github.repository }}/server:latest

      # Deploy Frontend
      - name: Deploy frontend to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ secrets.AZURE_WEBAPP_NAME_FRONTEND }}
          images: ghcr.io/${{ github.repository }}/client:latest
