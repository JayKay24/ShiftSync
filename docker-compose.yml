services:
  db:
    image: postgres:16-alpine
    container_name: shiftsync_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: shiftsync
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d shiftsync"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always

  server:
    build:
      context: .
      dockerfile: Dockerfile-server
    container_name: shiftsync_server
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=3000
    depends_on:
      db:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
